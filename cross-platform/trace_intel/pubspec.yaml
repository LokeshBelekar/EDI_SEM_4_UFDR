name: trace_intel
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # TraceIntel Dependencies
  provider: ^6.1.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.6.18+3
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  
  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # This tells Flutter to bundle the .env file with the app
  assets:
    - .env